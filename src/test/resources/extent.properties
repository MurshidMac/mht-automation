extent.reporter.spark.start=true
extent.reporter.spark.out=target/extent-reports/ExtentReport.html

# Report title and name shown in the HTML
extent.reporter.spark.config.reportName=MHT Automation Report
extent.reporter.spark.config.documentTitle=MHT Test Results

# Keep all assets self-contained so screenshot links never break
extent.reporter.spark.config.offlineMode=true
screenshot.dir=target/extent-reports/screenshots/
screenshot.rel.path=screenshots/

# PDF report — enabled alongside the HTML Spark report
extent.reporter.pdf.start=true
extent.reporter.pdf.out=target/extent-reports/ExtentReport.pdf

# PDF report title and document metadata
extent.reporter.pdf.config.documentTitle=MHT Test Results
extent.reporter.pdf.config.reportName=MHT Automation Report

# Show detailed step-level info and thumbnails in the PDF
extent.reporter.pdf.config.displayExceptions=true
extent.reporter.pdf.config.displayScreenshots=false
