name: MHT Automation CI

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]
  workflow_dispatch:   # allows manual trigger from GitHub UI

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Verify Chrome installation
        run: google-chrome --version

      - name: Build project (compile only, skip tests)
        run: mvn clean compile -B

      - name: Run tests (headless Chrome)
        run: mvn test -B
        env:
          CHROME_HEADLESS: "true"

      # ── Artifacts ──────────────────────────────────────────────────────────

      - name: Upload Extent Reports artifact (HTML + PDF)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: extent-report-${{ github.run_number }}
          path: |
            target/extent-reports/ExtentReport.html
            target/extent-reports/ExtentReport.pdf
          retention-days: 30

      - name: Upload Cucumber HTML Report artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: cucumber-report-${{ github.run_number }}
          path: target/cucumber-html-report.html
          retention-days: 30

      # ── GitHub Pages deployment ────────────────────────────────────────────
      # Only deploy on pushes to main/master, not on PRs
      - name: Upload Pages content
        if: always() && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')
        uses: actions/upload-pages-artifact@v3
        with:
          path: target/extent-reports   # deploys the whole folder as the Pages root

      # ── Job summary with links ─────────────────────────────────────────────
      - name: Write job summary
        if: always()
        run: |
          REPO="${{ github.repository }}"
          RUN_NUMBER="${{ github.run_number }}"
          RUN_ID="${{ github.run_id }}"
          PAGES_URL="https://$(echo $REPO | cut -d'/' -f1).github.io/$(echo $REPO | cut -d'/' -f2)/ExtentReport.html"
          ARTIFACT_URL="https://github.com/${REPO}/actions/runs/${RUN_ID}"

          echo "## 📊 Test Report Links — Run #${RUN_NUMBER}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Report | Link |" >> $GITHUB_STEP_SUMMARY
          echo "|--------|------|" >> $GITHUB_STEP_SUMMARY
          echo "| 🌐 HTML Report (GitHub Pages) | [Open ExtentReport.html](${PAGES_URL}) |" >> $GITHUB_STEP_SUMMARY
          echo "| 📦 PDF + HTML Download | [Download from Artifacts](${ARTIFACT_URL}) |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "> The Pages link shows the **latest run** only. All runs are available as downloadable artifacts." >> $GITHUB_STEP_SUMMARY

  # Separate job required by the official GitHub Pages deploy flow
  deploy-pages:
    needs: build-and-test
    runs-on: ubuntu-latest
    if: always() && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
